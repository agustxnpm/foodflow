name: Build Windows Installer
# FoodFlow v1.0
# Prerequisito en PC destino: Java 21 (Temurin) instalado por el técnico.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      # 1. Checkout del código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java 21 para compilar el backend
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      # 3. Compilar backend Spring Boot
      - name: Build backend
        working-directory: comandas-backend
        run: ./mvnw.cmd clean package -DskipTests

      # 4. Copiar JAR a binarios de Tauri
      - name: Copy backend JAR to Tauri binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "comandas-frontend\src-tauri\binaries" | Out-Null
          Copy-Item "comandas-backend\target\comandas-backend-0.0.1-SNAPSHOT.jar" "comandas-frontend\src-tauri\binaries\backend.jar"
          Write-Host "OK: backend.jar copiado"

      # 5. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: comandas-frontend/package-lock.json

      # 6. Instalar dependencias del frontend
      - name: Install frontend dependencies
        working-directory: comandas-frontend
        run: npm ci

      # 7. Setup Rust (necesario para Tauri)
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # 8. Construir Tauri para Windows (sin cache — build limpio)
      - name: Build Tauri app
        working-directory: comandas-frontend
        run: npm run tauri:build

      # 10. Subir instalador NSIS (.exe)
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: FoodFlow-Windows-NSIS
          path: comandas-frontend/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

      # 11. Subir instalador MSI
      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: FoodFlow-Windows-MSI
          path: comandas-frontend/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30
