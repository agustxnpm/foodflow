name: Build Windows Installer
# FoodFlow v1.0
# Prerequisito en PC destino: Java 21 (Temurin) instalado por el técnico.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      # 1. Checkout del código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java 21 para compilar el backend
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      # 3. Compilar backend Spring Boot (fat JAR con JarLauncher embebido)
      - name: Build backend
        working-directory: comandas-backend
        run: ./mvnw.cmd clean package -DskipTests

      # 4. Copiar FAT JAR a binarios de Tauri y validar
      - name: Copy backend JAR to Tauri binaries
        shell: pwsh
        run: |
          $jarSource = "comandas-backend\target\comandas-backend-0.0.1-SNAPSHOT.jar"
          $jarDest   = "comandas-frontend\src-tauri\binaries\backend.jar"

          # Validar que el fat JAR existe (no el .original)
          if (-Not (Test-Path $jarSource)) {
            Write-Error "FATAL: Fat JAR no encontrado en $jarSource. Verificar spring-boot-maven-plugin."
            exit 1
          }

          New-Item -ItemType Directory -Force -Path "comandas-frontend\src-tauri\binaries" | Out-Null
          Copy-Item $jarSource $jarDest

          # Validar que el JAR contiene JarLauncher (es un fat JAR válido)
          $entries = jar tf $jarDest | Select-String "JarLauncher"
          if (-Not $entries) {
            Write-Error "FATAL: backend.jar no contiene JarLauncher. El repackage de Spring Boot falló."
            exit 1
          }

          $sizeMB = [math]::Round((Get-Item $jarDest).Length / 1MB, 2)
          Write-Host "OK: backend.jar copiado ($sizeMB MB) — JarLauncher verificado"

      # 5. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: comandas-frontend/package-lock.json

      # 6. Instalar dependencias del frontend
      - name: Install frontend dependencies
        working-directory: comandas-frontend
        run: npm ci

      # 7. Setup Rust (necesario para Tauri)
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # 8. Construir Tauri para Windows (sin cache — build limpio)
      #    Las variables VITE_* deben estar presentes en el entorno para que
      #    Vite las incruste en el bundle durante el build.
      - name: Build Tauri app
        working-directory: comandas-frontend
        env:
          VITE_LOCAL_ID: ${{ secrets.VITE_LOCAL_ID || '123e4567-e89b-12d3-a456-426614174000' }}
          VITE_API_URL: "http://localhost:8080/api"
        run: npm run tauri:build

      # 10. Subir instalador NSIS (.exe)
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: FoodFlow-Windows-NSIS
          path: comandas-frontend/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

      # 11. Subir instalador MSI
      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: FoodFlow-Windows-MSI
          path: comandas-frontend/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30
